services:
  create-astral:
    image: itzg/minecraft-server:java17
    container_name: create-astral

    ports:
      - "25565:25565"

    environment:
      EULA: "TRUE"
      ENABLE_RCON: "true"
      RCON_PASSWORD: "password"

      # Use your own Fabric server jar
      TYPE: CUSTOM
      CUSTOM_SERVER: server.jar

      # Memory
      MEMORY: 6G

      # Uses Aikar's JVM flags (run script)
      USE_AIKAR_FLAGS: "true"

    volumes:
      - ./server:/data

    restart: unless-stopped

  playit-modpack:
    container_name: playit-modpack
    image: pepaondrugs/playitgg-docker:latest
    volumes:
      - ./astral/playit:/playit
    restart: unless-stopped
    stdin_open: true
    tty: true
