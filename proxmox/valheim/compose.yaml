services:
  valheim:
    image: ghcr.io/community-valheim-tools/valheim-server
    cap_add:
      - sys_nice
    volumes:
      - $HOME/valheim-server/config:/config
      - $HOME/valheim-server/data:/opt/valheim
    ports:
      - "2456-2458:2456-2458/udp"
      - "9001:9001/tcp"
    env_file:
      - $HOME/valheim-server/valheim.env
    restart: unless-stopped
    stop_grace_period: 2m

  playit-docker2:
    container_name: playit-docker2
    image: pepaondrugs/playitgg-docker:latest
    volumes:
      - $HOME/valheim-server/playit:/playit
    restart: unless-stopped
